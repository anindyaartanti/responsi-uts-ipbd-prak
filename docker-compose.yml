# ============================================================
# Wired Pipeline — Docker Compose
# Services: PostgreSQL, FastAPI, Airflow (Webserver + Scheduler)
# ============================================================

version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "wired-pipeline-secret-key-change-in-prod"
    # Variabel untuk DAG
    AIRFLOW_VAR_WIRED_API_URL: "http://wired-api:8000"
    AIRFLOW_VAR_PG_HOST:       "postgres"
    AIRFLOW_VAR_PG_PORT:       "5432"
    AIRFLOW_VAR_PG_DB:         "wired_pipeline"
    AIRFLOW_VAR_PG_USER:       "wired_user"
    AIRFLOW_VAR_PG_PASSWORD:   "wired_pass"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - wired-net

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wired-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_root
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/init_databases.sh:/docker-entrypoint-initdb.d/00_init_databases.sh
      - ./init/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wired-net

  # ── FastAPI ─────────────────────────────────────────────────
  wired-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: wired-api
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - wired-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Airflow Init ────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: wired-airflow-init
    command:
      - bash
      - -c
      - |
        pip install psycopg2-binary requests --quiet &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@wiredpipeline.local \
          --password admin
    restart: "no"

  # ── Airflow Webserver ───────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: wired-airflow-webserver
    restart: unless-stopped
    command: >
      bash -c "pip install psycopg2-binary requests --quiet && airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ───────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: wired-airflow-scheduler
    restart: unless-stopped
    command: >
      bash -c "pip install psycopg2-binary requests --quiet && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
  airflow_logs:
  airflow_plugins:

# ── Networks ─────────────────────────────────────────────────
networks:
  wired-net:
    driver: bridge
